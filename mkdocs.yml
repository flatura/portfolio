site_name: "Dmitry M. - Portfolio | Architecture & Systems Design"
site_url: https://flatura.github.io/portfolio
theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
plugins:
  - i18n:
      docs_structure: folder
      fallback_to_default: true
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: ru
          name: Русский
          build: true
          site_name: "Портфолио Дмитрия М. - Проектирование и системный анализ"
          nav:
            - Главная: index.md
            - Подход и услуги: services.md
            - Ключевые проекты:
                - Botanical SaaS: projects/botanical.md
                - AI Operational Intelligence Platform: projects/ai_oip.md
                - AWS Audio Transcriber: projects/serverless_transcriber.md
            - Корпоративный опыт:
                - FMCG ML Прогнозатор / Планировщик: projects/fmcg_forecaster_planner.md
                - ГИС Визуализатор корп.данных: projects/gis_bi_1.md
                - ГИС Визуализатор (продукт): projects/gis_bi_2.md
                - FastMBO: projects/fastmbo.md
            - Внутренние инициативы:
                - PolylineMechanic: projects/polyline-mechanic.md
                - ExpendIt: projects/expendit.md
                - GraphMechanic: projects/graph-mechanic.md
  - search
  - minify:
      minify_html: true
  - include-markdown
  - glightbox
nav:
  - Home: index.md
  - Approach & Services: services.md
  - Featured Projects:
      - Botanical SaaS: projects/botanical.md
      - AI Operational Intelligence Platform: projects/ai_oip.md
      - AWS Audio Transcriber: projects/serverless_transcriber.md
  - Enterprise Experience:
      - FMCG ML Forecaster / Planner: projects/fmcg_forecaster_planner.md
      - GIS Data Visualization Project: projects/gis_bi_1.md
      - GIS Data Visualization Product: projects/gis_bi_2.md
      - FastMBO: projects/fastmbo.md
  - Internal Initiatives:
      - PolylineMechanic: projects/polyline-mechanic.md
      - ExpendIt: projects/expendit.md
      - GraphMechanic: projects/graph-mechanic.md
markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid-custom
          format: !!python/name:pymdownx.superfences.fence_code_format
extra:
  social:
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/morozovda-sa/
    - icon: fontawesome/brands/upwork
      link: https://www.upwork.com/freelancers/~0139dd3a8609dcc36e
    - icon: fontawesome/brands/github
      link: https://github.com/flatura
  extra_javascript:
    - js/mermaid_icons.js
  extra_css:
    - css/mermaid_icons.css