                    - Архитектура и интеграции: projects/botanical/06-architecture-and-integrations.md
                    - Решения, компромиссы и риски: projects/botanical/08-decisions-trade-offs-and-risks.md
                    - Дорожная карта и демонстрация: projects/botanical/09-roadmap-and-demonstration.md
                    - Всё вместе: projects/botanical/all-in-one.md
                    - Архитектурное ревью: projects/botanical/architecture-review.md
