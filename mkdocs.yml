site_name: "Dmitry M. - Portfolio | Architecture & Systems Design"
site_url: https://flatura.github.io/portfolio/

validation:
  nav:
    omitted_files: info
  links:
    not_found: warn

theme:
  name: material
  language: en

  features:
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.tracking
    - search.highlight
    - search.suggest
    - content.code.copy

  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode

    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - i18n:
      docs_structure: folder
      fallback_to_default: true
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: ru
          name: Русский
          build: true
          site_name: "Портфолио Дмитрия М. - Проектирование и системный анализ"
          nav:
            - Главная: index.md
            - Подход и услуги: services.md
            - Ключевые проекты:
                - Платформа для ботанических садов (SaaS):
