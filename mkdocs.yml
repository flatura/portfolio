markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid-custom
          format: !!python/name:pymdownx.superfences.fence_code_format

extra:
  generator: false

extra_javascript:
  - javascripts/mermaid_icons.js
  - javascripts/test.js

extra_css:
  - css/mermaid_icons.css
  - css/extra.css