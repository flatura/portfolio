site_name: "Dmitry M. - Portfolio | Architecture & Systems Design"
site_url: https://flatura.github.io/portfolio/

theme:
  name: material
  language: en

  features:
    - navigation.sections
    - navigation.top
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.tracking
    - search.highlight
    - search.suggest
    - content.code.copy

  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode

    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - i18n:
      docs_structure: folder
      fallback_to_default: true
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: ru
          name: Русский
          build: true
          site_name: "Портфолио Дмитрия М. - Проектирование и системный анализ"
          nav:
            - Главная: index.md
            - Подход и услуги: services.md
            - Ключевые проекты:
                - Botanical SaaS: projects/botanical.md
                - AI Operational Intelligence Platform: projects/ai_oip.md
                - AWS Audio Transcriber: projects/serverless_transcriber.md
            - Корпоративный опыт:
                - FMCG ML Прогнозатор / Планировщик: projects/fmcg_forecaster_planner.md
                - ГИС ж/д-логистика: projects/enterprise_gis.md
                - Система целеполагания: projects/fastmbo.md
            - Внутренние инициативы:
                - PolylineMechanic: projects/polyline-mechanic.md
                - DocsAnalyzer: projects/docsanalyzer.md
                - ExpendIt: projects/expendit.md
                - GraphMechanic: projects/graph-mechanic.md

  - search
  - minify:
      minify_html: true
  - include-markdown
  - glightbox

nav:
  - Home: index.md
  - Approach & Services: services.md
  - Featured Projects:
      - Botanical SaaS: projects/botanical.md
      - AI Operational Intelligence Platform: projects/ai_oip.md
      - AWS Audio Transcriber: projects/serverless_transcriber.md
  - Enterprise Experience:
      - FMCG ML Forecaster / Planner: projects/fmcg_forecaster_planner.md
      - GIS train logistics: projects/enterprise_gis.md
      - MBO KPI system: projects/fastmbo.md
  - Internal Initiatives:
      - PolylineMechanic: projects/polyline-mechanic.md
      - DocsAnalyzer: projects/docsanalyzer.md
      - ExpendIt: projects/expendit.md
      - GraphMechanic: projects/graph-mechanic.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid-custom
          format: !!python/name:pymdownx.superfences.fence_code_format

extra:
  generator: false

extra_javascript:
  - javascripts/mermaid_icons.js
  - javascripts/test.js

extra_css:
  - css/mermaid_icons.css
  - css/extra.css